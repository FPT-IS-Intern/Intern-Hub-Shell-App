<header class="app-header" [style.padding]="paddingHeader">
  <div class="header-left">
    <img class="logo" [src]="data.logo || 'assets/FPT-IS-Logo.png'" alt="Logo" />
  </div>

  <div class="header-right">
    @for (item of data.headerItems; track $index) {
      <button
        class="header-btn"
        [attr.aria-label]="item.content"
        (click)="handleActionClick(item, $event)"
      >
        <app-icon
          [iconData]="
            getIconData(item.icon, item.colorIcon, item.width || '16px', item.height || '16px')
          "
        ></app-icon>
        @if (item.badge) {
          <span class="badge">{{ item.badge }}</span>
        }
      </button>
    }

    <app-user-menu [data]="data.userMenuData"></app-user-menu>
  </div>
</header>
