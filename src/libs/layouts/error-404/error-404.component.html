<div class="error-layout">
  <div class="error-page">
    <div class="error-page-content">
      <div class="error-page-content-image">
        <img [src]="imageSrc" alt="Error" />
      </div>
      <div class="error-page-content-text">
        <p class="error-page-content-text-description">{{ description }}</p>
      </div>
    </div>
  </div>
</div>
