<div class="web-container">
  <div class="mobile-warning">
    <div class="mobile-warning-content">
      <img src="/Home-Page-Mobile.svg" alt="Home Page Mobile" />
      <h2>Truy cập FPT Intern Hub bằng ứng dụng để có trải nghiệm đầy đủ</h2>
      <p>Vui lòng sử dụng thiết bị có màn hình lớn hơn hoặc tải ứng dụng mobile.</p>
    </div>
  </div>

  <div class="main-layout">
    <app-header-component [data]="headerData"></app-header-component>

    <div class="layout-body">
      <div
        class="layout-body-sidebar"
        [class.mobile-open]="isMobileSidebarOpen"
        [class.expanded]="isSidebarExpanded"
      >
        <app-sidebar
          [data]="sidebarData"
          [isSidebarExpanded]="isSidebarExpanded"
          (sidebarToggled)="onSidebarToggle($event)"
          [toggleButtonIconData]="toggleButtonIconConfig"
          [closeButtonIconData]="closeButtonIconConfig"
        ></app-sidebar>
      </div>

      <!-- Mobile Sidebar Overlay -->
      @if (isMobileSidebarOpen) {
        <div class="sidebar-overlay" (click)="closeMobileSidebar()" onkeypress=""></div>
      }

      <!-- Content - Scrollable -->
      <div class="layout-body-content">
        <div class="content-wrapper">
          <router-outlet />
        </div>
      </div>
    </div>
  </div>
</div>
