<div class="approval-list">
  <div class="approval-list-header">
    <span class="approval-list-header-left">{{headerContentRight}}</span>
    <div>
      <p>{{headerContentLeft}}</p>
    </div>
  </div>

  <div class="approval-list-content">
    <app-approval-list-item *ngFor="let row of rows" [name]="row.name" [date]="row.date"
      [rightTemplate]="row.rightTemplate" [rightContext]="row.rightContext">
    </app-approval-list-item>
  </div>
</div>
