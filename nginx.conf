server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Cache control for micro-frontend shell assets.

    # 1. No-cache: HTML entrypoint, runtime env, manifests, service worker.
    location ~* ^/(index\.html|env\.js|firebase-messaging-sw\.js|federation\.manifest\.json|federation\.manifest\.local\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    }

    # 2. Long cache: hashed JS/CSS bundles from Angular build output.
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    }

    # 3. Medium cache: images, fonts, media.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800" always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    }

    # 4. Loader.io verification.
    location = /loaderio-3702cddcc39cb36f2affc82254346245.txt {
        add_header Content-Type "text/plain" always;
        try_files $uri =404;
    }

    location = /loaderio-3702cddcc39cb36f2affc82254346245.html {
        add_header Content-Type "text/html" always;
        try_files $uri =404;
    }

    location ~ ^/loaderio-3702cddcc39cb36f2affc82254346245/?$ {
        add_header Content-Type "text/html" always;
        try_files /loaderio-3702cddcc39cb36f2affc82254346245/index.html =404;
    }

    # 5. Default route fallback.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    }
}
