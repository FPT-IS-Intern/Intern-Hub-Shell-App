server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # =============================================
    # CACHE CONTROL - Quan trọng cho Micro-Frontend
    # =============================================

    # 1. KHÔNG CACHE: index.html, federation manifest, remoteEntry
    #    Các file này PHẢI luôn lấy bản mới nhất từ server
    location ~* ^/(index\.html|federation\.manifest\.json|federation\.manifest\.local\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    }

    # 2. CACHE LÂU: JS, CSS (đã có hash trong filename từ Angular build)
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    }

    # 3. CACHE TRUNG BÌNH: Ảnh, fonts, media
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800" always;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    }

    # 5. LOADER.IO VERIFICATION
    location = /loaderio-3702cddcc39cb36f2affc82254346245.txt {
        add_header Content-Type "text/plain" always;
        try_files $uri =404;
    }

    location = /loaderio-3702cddcc39cb36f2affc82254346245.html {
        add_header Content-Type "text/html" always;
        try_files $uri =404;
    }

    location ~ ^/loaderio-3702cddcc39cb36f2affc82254346245/?$ {
        add_header Content-Type "text/html" always;
        try_files /loaderio-3702cddcc39cb36f2affc82254346245/index.html =404;
    }

    # 4. MẶC ĐỊNH: Các file khác (bao gồm JSON configs)
    location / {
        try_files $uri $uri/ /index.html;

        # Không cache mặc định cho các file không match ở trên
        add_header Cache-Control "no-cache" always;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    }
}